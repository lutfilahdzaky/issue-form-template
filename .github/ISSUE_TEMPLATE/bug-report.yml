name: Bug Report
description: Report a reproducible bug or unexpected behavior in the modpack.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please make sure:
        - You are using the latest version of the modpack.
        - The issue has not already been reported.
        - No unsupported modifications are installed.

  - type: input
    id: modpack-version
    attributes:
      label: Modpack Version
      description: Which version of the modpack are you using?
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did the issue occur?
      options:
        - Singleplayer
        - Multiplayer
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue in detail.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Crash Report
      description: |
        Paste your latest.log, crash report, or upload them using a service like mclo.gs.

  - type: input
    id: screenshots
    attributes:
      label: Screenshots or Videos
      description: If applicable, provide a link.

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Anything else that may help us identify the problem.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched for existing issues before creating this report.
          required: true
        - label: I am using the latest version of the modpack.
          required: true
